<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        th, td{
            padding: 12px 15px;
        }
        html{
            scroll-behavior: smooth;
        }
    </style>
</head>
<body>
    <div class="container-fluid ">
        <div class="row">
        <nav class="navbar navbar-expand-sm bg-success navbar-dark">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="profile.html">Profile</a></li>
                <li class="nav-item"><a class="nav-link" href="calculator.html">calculation</a></li>
                <li class="nav-item"><a class="nav-link" href="login.html">log out</a></li>
            </ul>
        </nav>
        </div>
        <div class="row">
            <form>
            <label>Enter your birthdat</label><br>
            <div class="row">
            <div class="col">
            <input type="text" class="form-control" name="day" id="dayIn" style="width: 30;" placeholder="day" required>
            </div>
            <div class="col">
            <input type="text" class="form-control" name="month" id="monthIn" style="width: 30;" placeholder="month" required>
            </div>
            <div class="col mb-3">
            <input type="text" class="form-control" name="year" id="yearIn" style="width: 30;" placeholder="year" required>
            </div></div>
                <button type="button" class="btn btn-success mb-3" style="width: 80%;" onclick="calculteAge()"> Get Age </button>
            </form>
            <table class="table-hover shadow mb-3" style="width: 80%; align-content:center ;" >
                <tr><td>day</td><td><p id="dayOut">---</p></td></tr>
                <tr><td>month</td><td><p id="monthOut">---</p></td></tr>
                <tr><td>year</td><td><p id="yearOut">---</p></td></tr>
            </table>

        </div>
    </div>
<script type="text/javascript">
        var days = document.getElementById("dayOut");
        var months = document.getElementById("monthOut");
        var years = document.getElementById("yearOut");
    function calculteAge(){
        var day = document.getElementById("dayIn").value;
        var month = document.getElementById("monthIn").value;
        var year = document.getElementById("yearIn").value;
        var newDate = new Date();
        var newDay = newDate.getDate();
        var newMonth = newDate.getMonth();
        var newYear = newDate.getFullYear();

        if(day>31 || day<1){
            alert("day must be in [1, 31]!")
            day.focus();
            return false;
        }
        if(month>12 || month<1){
            alert("month must be in [1, 12]!")
            month.focus();
            return false;
        }
        if(year>newYear){
            alert("invalid year!")
            year.focus();
            return false;
        }



        var d = newDay - day;
        var m = ++newMonth - month;
        var y = newYear - year;
        if(m < 0){
            y--
            m += 12
        }
        if(d < 0){
            m--
            d += 30
        }
        days.innerHTML = d;
        months.innerHTML = m;
        years.innerHTML = y;
}


</script>
</body>
</html>
