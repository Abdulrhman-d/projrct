<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>

</head>
<body>
    <div class="container-fluid ">
        <div class="row">
        <nav class="navbar navbar-expand-sm bg-success navbar-dark">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="profile.html" >rofile</a></li>
                <li class="nav-item"><a class="nav-link" href="calculator.html">calculation</a></li>
                <li class="nav-item"><a class="nav-link" href="login.html">log out</a></li>
            </ul>
        </nav>
        </div>
        <div class="row">
            <form name="LogForm" action="profile.html" onsubmit="return ValidLog()" method="post">
                <label for="usern">Username:</label><br>
                <input type="text" id="usern" size="60" name="Username" placeholder="Username"><br>
                <label for="passw">Password:</label><br>
                <input type="text" id="passw" size="60" name="Password" placeholder="Password"><br>
                <label for="repassw">Re-Password:</label><br>
                <input type="text" id="repassw" size="60" name="RePassword" placeholder="Confirm Password"><br>
                <label for="phonenum">Phone Number:</label><br>
                <input type="text" id="phonenum" size="60" name="PhoneNumber" placeholder="Phone"><br><br>
                <input type="submit" class="btn btn-success" value="Sing Up" name="Submit">
            </form>

            <script type="text/javascript">
                function tryAlert(){
                    let usernameee = document.form["RegForm"]["Username"];
                    alert("Invalid phone number - specify your phone number");
                    return false;
                }
                function ValidLog(){
                    let username = document.forms["LogForm"]["Username"];
                    let password = document.forms["LogForm"]["Password"];
                    let confirmP = document.forms["LogForm"]["RePassword"];
                    let phoneNum = document.forms["LogForm"]["PhoneNumber"];
                    if(username.value == ""){
                        alert("Invalid username - specify your first name");
                        username.focus();
                        return false;
                    }
                    if(username.value.search(/^[A-Za-z]+$/) == -1){
                        alert("Invalid username - specify your first name");
                        username.focus();
                        return false;
                    }
                    if(password.value.search(/^s+\d{6,}@student\.squ\.edu\.om$/) == -1){
                        alert("Please enter a valid SQU email address");
                        password.focus();
                        return false;
                    }
                    if(confirmP.value != password.value){
                        alert("Password do not match!");
                        password.focus();
                        return false;
                    }
                    if(phoneNum.value.search(/^[279]\d{7}$/) == -1 ){
                        alert("8 digit Invalid phone number - specify your phone number");
                        phoneNum.focus();
                        return false;
                    }

                }
            </script>
        </div>
    </div>

            
</body>
</html>
