<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        .cardStyle{
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card{
            width: 500px;
            border: 1px solid #ddd;
            padding: 20px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }
       button{
        width: 100%;
        height: 60px;
       }
    </style>

</head>
<body>
    <div class="container-fluid ">
        <div class="row">
        <nav class="navbar navbar-expand-sm bg-success navbar-dark">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="profile.html">Profile</a></li>
                <li class="nav-item"><a class="nav-link" href="calculator.html">calculation</a></li>
                <li class="nav-item"><a class="nav-link" href="login.html">log out</a></li>
            </ul>
        </nav></div>

            <div class="row cardStyle">
            <div class="card ">
                <img class="card-img-top rounded-circle" id="image" src="profile1.png" alt="Card image">
                <div class="card-title" id="name" >salim</div>
                <div class="card-text" id="title">Senior Programmer</div>
                </div>
            </div><br>
            <div class="row">
                <div class="col-1"></div>
                <div class="col-4">
                    <button type="button" class="btn btn-outline-success" onclick="goBack()">
                        <img src="arrow_back.png" alt="arrow back" style="width: 50px;">
                    </button>
                </div>
                <div class="col-2"></div>
                <div class="col-4">
                    <button type="button" class="btn btn-outline-success" onclick="goForward()">
                        <img src="arrow_forward.png" alt="arrow forward" style="width: 50px;">
                    </button>
                </div>
            </div>
    </div>

    <script type="text/javascript">
        var images = ["profile1.png","profile2.png","profile3.png"];
        var names = ["Salim", "Ahmed", "Omar"];
        var titles = ["Senior Programmer","Graphic Designer", "Scriptwriter"] 
        var personNum = 0;
        function goForward(){
            if (personNum < 2) personNum++;
            else personNum = 0 ;
            changeImage();
        }
        function goBack(){
            if (personNum > 0 ) personNum--;
            else personNum = 2;
            changeImage();
        }
        function changeImage(){
            document.getElementById("image").src = images[personNum];
            document.getElementById("name").innerHTML = names[personNum];
            document.getElementById("title").innerHTML = titles[personNum];
        }

    </script>
</body>
</html>
